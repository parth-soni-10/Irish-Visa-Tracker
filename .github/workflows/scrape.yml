name: Scrape Visa Decisions

on:
  workflow_dispatch: {}   # manual "Run workflow" button — still available for on-demand runs
  schedule:
    - cron: '30 2 * * *'  # 08:00 IST
    - cron: '0 3 * * *'   # 08:30 IST
    - cron: '30 3 * * *'  # 09:00 IST
    - cron: '0 4 * * *'   # 09:30 IST
    - cron: '30 4 * * *'  # 10:00 IST
    - cron: '0 5 * * *'   # 10:30 IST
    - cron: '30 5 * * *'  # 11:00 IST
    - cron: '0 6 * * *'   # 11:30 IST
    - cron: '30 6 * * *'  # 12:00 IST — final run of the day

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
          IS_FINAL_RUN: ${{ github.event.schedule == '30 6 * * *' }}
        run: python scraper.py
