<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irish Visa Decision Tracker</title>
<base target="_blank">
</head>
<body>
    <div id="visa-dash"></div>
    <style>

        #visa-dash * { box-sizing: border-box; }
        #visa-dash {
            --ink: #0f172a;
            --ink-soft: #475569;
            --ink-muted: #94a3b8;
            --surface: #ffffff;
            --surface-raised: #f8fafc;
            --surface-hover: #f1f5f9;
            --border: #e2e8f0;
            --green: #059669;
            --green-light: #10b981;
            --green-soft: #dcfce7;
            --green-text: #166534;
            --amber: #d97706;
            --amber-soft: #fef3c7;
            --amber-text: #92400e;
            --red: #dc2626;
            --red-soft: #fee2e2;
            --red-text: #991b1b;
            font-family: -apple-system, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
            background: var(--surface);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        #visa-dash .mono { font-family: "SF Mono", "JetBrains Mono", Consolas, Menlo, monospace; }
        #visa-dash .eyebrow {
            font-size: 11px;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--green);
            font-weight: 700;
            margin-bottom: 4px;
        }
        #visa-dash h1 {
            font-size: 28px;
            margin: 0 0 2px;
            font-weight: 800;
            letter-spacing: -.02em;
        }
        #visa-dash .sub {
            color: var(--ink-muted);
            font-size: 13px;
            margin-bottom: 20px;
        }
        #visa-dash .navpills {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        #visa-dash .navpill {
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 100px;
            cursor: pointer;
            border: none;
            color: var(--ink-muted);
            background: var(--surface-raised);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        #visa-dash .navpill::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none;
            opacity: 0;
        }
        #visa-dash .navpill.rippling::after {
            animation: nav-ripple 0.5s ease-out;
        }
        @keyframes nav-ripple {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.4; }
            100% { transform: translate(-50%, -50%) scale(30); opacity: 0; }
        }
        #visa-dash .navpill:hover {
            background: var(--surface-hover);
            color: var(--ink-soft);
            transform: translateY(-1px);
        }
        #visa-dash .navpill.active {
            color: #fff;
            box-shadow: 0 6px 22px rgba(0,0,0,.18);
        }
        #visa-dash .navpill[data-tab="home"].active   { background: linear-gradient(135deg, var(--green), var(--green-light)); }
        #visa-dash .navpill[data-tab="daily"].active  { background: linear-gradient(135deg, #7c3aed, #a78bfa); }
        #visa-dash .navpill[data-tab="past"].active   { background: linear-gradient(135deg, var(--amber), #f59e0b); }
        #visa-dash .navpill[data-tab="suggest"].active{ background: linear-gradient(135deg, #ec4899, #f472b6); }
        #visa-dash .navpill.active:hover { filter: brightness(0.9); }
        #visa-dash .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }
        #visa-dash .card {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            opacity: 0;
            transform: translateY(12px);
            animation: visa-card-in 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #visa-dash .card:nth-child(1) { animation-delay: 0.03s; }
        #visa-dash .card:nth-child(2) { animation-delay: 0.08s; }
        #visa-dash .card:nth-child(3) { animation-delay: 0.13s; }
        #visa-dash .card:nth-child(4) { animation-delay: 0.18s; }
        #visa-dash .card:nth-child(5) { animation-delay: 0.23s; }
        #visa-dash .card:nth-child(6) { animation-delay: 0.28s; }
        #visa-dash .card:nth-child(7) { animation-delay: 0.33s; }
        #visa-dash .card:nth-child(8) { animation-delay: 0.38s; }
        @keyframes visa-card-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            #visa-dash .card { animation: none; }
        }
#visa-dash .card .label {
            font-size: 10px;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: .07em;
            margin-bottom: 8px;
            font-weight: 600;
        }
        #visa-dash .card .value {
            font-size: 22px;
            font-weight: 700;
            transition: transform 0.15s;
        }
        #visa-dash .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            border-color: #cbd5e1;
        }
        #visa-dash .card:hover .value { transform: scale(1.02); }
        #visa-dash .card .value.green { color: var(--green); }
        #visa-dash .card .value.red { color: var(--red); }
        #visa-dash .card .value.amber { color: var(--amber); }
        #visa-dash .table-wrap {
            overflow-x: auto;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface-raised);
        }
        #visa-dash table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            min-width: 380px;
        }
        #visa-dash th {
            text-align: left;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--ink-muted);
            background: var(--surface-raised);
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            font-weight: 700;
        }
        #visa-dash td {
            padding: 11px 14px;
            font-size: 13.5px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            color: var(--ink-soft);
        }
        #visa-dash tbody tr {
            transition: background 0.15s;
            position: relative;
        }
        #visa-dash tbody tr::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--green), var(--green-light));
            opacity: 0;
            border-radius: 0 3px 3px 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }
        #visa-dash tbody tr:hover::before {
            opacity: 1;
        }
        #visa-dash tbody tr:hover {
            background: var(--surface-hover);
        }
        #visa-dash tr:last-child td { border-bottom: none; }
        #visa-dash .pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
        #visa-dash .pill::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-20deg);
            transition: left 0.5s ease;
            pointer-events: none;
        }
        #visa-dash .pill:hover::after {
            left: 120%;
        }
        #visa-dash .pill.green { background: var(--green-soft); color: var(--green-text); }
        #visa-dash .pill.red { background: var(--red-soft); color: var(--red-text); }
        #visa-dash .pill.amber { background: var(--amber-soft); color: var(--amber-text); }
        #visa-dash .searchbar {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 0 16px;
            height: 44px;
            background: var(--surface);
            margin-bottom: 16px;
            max-width: 420px;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        #visa-dash .searchbar:focus-within {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }
        #visa-dash .searchbar svg {
            flex-shrink: 0;
            opacity: 0.4;
        }
        #visa-dash .searchbar input[type=text] {
            border: none;
            outline: none;
            font-size: 14px;
            flex: 1;
            background: transparent;
            color: var(--ink);
            width: auto;
            max-width: none;
            padding: 0;
            margin: 0;
            border-radius: 0;
        }
        #visa-dash .searchbar input[type=text]:focus {
            outline: none;
            box-shadow: none;
        }
        #visa-dash input[type=text] {
            width: 100%;
            max-width: 320px;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 14px;
            background: var(--surface);
            transition: all 0.2s;
        }
        #visa-dash input[type=text]:focus,
        #visa-dash textarea:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }
        #visa-dash textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            font-family: inherit;
            min-height: 100px;
            margin-bottom: 12px;
            background: var(--surface);
            resize: vertical;
            transition: all 0.2s;
        }
        #visa-dash .btn {
            background: var(--green);
            color: #fff;
            border: none;
            padding: 11px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(5, 150, 105, 0.25);
        }
        #visa-dash .btn:hover {
            background: #047857;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(5, 150, 105, 0.35);
        }
        #visa-dash .btn:active { transform: scale(0.97); }
        #visa-dash .btn:disabled {
            opacity: .5;
            cursor: default;
            transform: none;
            box-shadow: none;
        }
        #visa-dash .note {
            font-size: 13px;
            color: var(--ink-muted);
            margin-top: 10px;
            line-height: 1.5;
        }
        #visa-dash .empty {
            padding: 48px 20px;
            text-align: center;
            color: var(--ink-muted);
            font-size: 14px;
        }
        #visa-dash .config-warn {
            background: var(--amber-soft);
            color: var(--amber-text);
            border: 1px solid #fcd34d;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 13px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        #visa-dash .config-warn code {
            background: rgba(0,0,0,.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SF Mono", Consolas, monospace;
            font-size: 12px;
        }
        #visa-dash .datefilter {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 0 14px;
            height: 44px;
            background: var(--surface);
            transition: all 0.2s;
            flex-shrink: 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        #visa-dash .datefilter:focus-within {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1);
        }
        #visa-dash .datefilter input[type=date] {
            border: none;
            outline: none;
            background: transparent;
            font-size: 13px;
            color: var(--ink);
            font-family: inherit;
        }
        #visa-dash .datefilter .clear-btn {
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            color: var(--ink-muted);
            transition: color 0.15s;
        }
        #visa-dash .datefilter .clear-btn:hover { color: var(--red); }
        #visa-dash .filter-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        #visa-dash .filter-row .note { margin: 0; }
        #visa-dash .latest-date {
            font-size: 15px;
            margin-bottom: 2px;
            font-weight: 500;
        }
        #visa-dash .tracking-since {
            font-size: 12px;
            color: var(--ink-muted);
            margin-bottom: 16px;
        }
        #visa-dash .topbar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }
        #visa-dash .topbar-fill {
            position: absolute;
            top: 0; left: 0;
            height: 100%;
            width: 35%;
            background: var(--green);
            border-radius: 2px;
            animation: visa-indeterminate 1.1s ease-in-out infinite;
        }
        @keyframes visa-indeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(340%); }
        }
        #visa-dash .skel {
            background: linear-gradient(90deg, var(--border) 25%, #f8fafc 37%, var(--border) 63%);
            background-size: 400px 100%;
            animation: visa-shimmer 1.3s ease infinite;
            border-radius: 8px;
        }
        @keyframes visa-shimmer {
            0% { background-position: -200px 0; }
            100% { background-position: 200px 0; }
        }
        #visa-dash .skel-pill { height: 34px; width: 90px; border-radius: 100px; }
        #visa-dash .skel-card { height: 72px; border-radius: 14px; opacity: 0; animation: visa-card-in 0.35s ease forwards, visa-shimmer 1.3s ease infinite; }
        #visa-dash .skel-row { height: 16px; margin: 14px 14px; border-radius: 4px; }
        #visa-dash .skel-wrap { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: var(--surface); }
        #visa-dash #tab-body { animation: visa-fade-in 0.25s ease; }
        @keyframes visa-fade-in {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #visa-dash .readme {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 20px;
            background: var(--surface-raised);
        }
        #visa-dash .readme .readme-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--ink);
        }
        #visa-dash .readme p, #visa-dash .readme ul {
            font-size: 13px;
            color: var(--ink-soft);
            line-height: 1.65;
            margin: 10px 0 0;
        }
        #visa-dash .readme ul {
            padding-left: 18px;
            margin-top: 8px;
        }
        #visa-dash .readme li { margin-bottom: 4px; }
        #visa-dash .readme strong { color: var(--ink); }
        #visa-dash .suggest-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: flex-start;
        }
        #visa-dash .suggest-grid .form-col { flex: 1 1 280px; min-width: 0; }
        #visa-dash .suggest-grid .table-col { flex: 2 1 400px; min-width: 0; }
        #visa-dash .suggest-grid .table-col .table-wrap { max-height: 420px; overflow-y: auto; overflow-x: auto; }
        #visa-dash .suggest-grid .table-col table {
            min-width: 600px;
            table-layout: fixed;
        }
        /* Hide the global tbody tr::before hover highlight on this fixed-layout table.
           Under table-layout:fixed that pseudo-element becomes an anonymous table
           cell and locks into the 1st column, shifting every real td over by one. */
        #visa-dash .suggest-grid .table-col table tbody tr::before { display: none; }
        #visa-dash .suggest-grid .table-col table th,
        #visa-dash .suggest-grid .table-col table td {
            white-space: normal !important;
            word-break: break-word;
            vertical-align: top;
            padding: 10px 12px;
        }
        #visa-dash .suggest-grid .table-col table th:nth-child(1),
        #visa-dash .suggest-grid .table-col table td:nth-child(1) {
            width: 22%;
            word-break: break-all;
        }
        #visa-dash .suggest-grid .table-col table th:nth-child(2),
        #visa-dash .suggest-grid .table-col table td:nth-child(2) {
            width: 18%;
        }
        #visa-dash .suggest-grid .table-col table th:nth-child(-n+2),
        #visa-dash .suggest-grid .table-col table td:nth-child(-n+2) {
            white-space: nowrap !important;
        }
        #visa-dash .suggest-grid .table-col table th:nth-child(n+3),
        #visa-dash .suggest-grid .table-col table td:nth-child(n+3) {
            width: 30%;
        }
        #visa-dash .suggest-grid .table-col .label {
            background: var(--surface);
            padding: 8px 12px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--ink-muted);
            font-weight: 700;
        }
        #visa-dash .suggest-grid .table-col table th { background: var(--surface) !important; }
        #visa-dash .titlerow {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        #visa-dash .titlerow h1 {
            margin: 0 0 2px;
        }
        #visa-dash .stutter-badge {
            background: var(--amber-soft);
            color: var(--amber-text);
            font-size: 11px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            margin-top: 3px;
            border: 1px solid #fcd34d;
        }
        #visa-dash .stutter-badge i {
            font-style: normal;
            font-size: 12px;
        }

        #visa-dash .theme-toggle {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            color: var(--ink-muted);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        #visa-dash .theme-toggle:hover {
            background: var(--surface-hover);
            color: var(--ink);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* ===== scroll-to-top button ===== */
        #visa-dash .scroll-top-btn {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 100;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink-soft);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
        }
        #visa-dash .scroll-top-btn.visible {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        #visa-dash .scroll-top-btn:hover {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
            box-shadow: 0 4px 18px rgba(5, 150, 105, 0.35);
            transform: translateY(-2px);
        }
        #visa-dash .scroll-top-btn:active {
            transform: scale(0.92);
        }
        @media (max-width: 760px) {
            #visa-dash .scroll-top-btn {
                bottom: 20px;
                right: 16px;
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }

        /* ===== hero (Mockup C — the hive) ===== */
        #visa-dash .hero {
            position: relative;
            border-radius: 20px;
            padding: 24px 28px;
            color: #fff;
            overflow: hidden;
            min-height: 180px;
            box-shadow: 0 12px 40px rgba(0,0,0,.10);
            margin-bottom: 20px;
            transition: opacity 0.4s ease;
        }
        /* per-tab gradients */
        #visa-dash .hero[data-id="home"]    { background: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px), linear-gradient(135deg, var(--green), var(--green-light)); background-size: 26px 26px, auto; }
        #visa-dash .hero[data-id="daily"]   { background: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px), linear-gradient(135deg, #7c3aed, #a78bfa); background-size: 26px 26px, auto; }
        #visa-dash .hero[data-id="past"]    { background: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px), linear-gradient(135deg, var(--amber), #fbbf24); background-size: 26px 26px, auto; }
        #visa-dash .hero[data-id="suggest"] { background: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px), linear-gradient(135deg, #ec4899, #f472b6); background-size: 26px 26px, auto; }
        /* floating blobs */
        #visa-dash .hero::before, #visa-dash .hero::after {
            content: ''; position: absolute; border-radius: 50%; pointer-events: none; z-index: 3;
        }
        #visa-dash .hero::before {
            width: 260px; height: 260px; top: -40%; right: -10%;
            background: rgba(255,255,255,.10);
        }
        #visa-dash .hero::after {
            width: 180px; height: 180px; bottom: -50%; left: 5%;
            background: rgba(255,255,255,.06);
        }
        @media (prefers-reduced-motion: no-preference) {

        @keyframes drift { 50% { transform: translate(20px,-15px) scale(1.08); } }

        #visa-dash .hero-body {

        /* ===== per-tab visuals ===== */

        #visa-dash .ring:nth-child(3) { width: 130px; height: 130px; animation-delay: 1.6s; }
        @keyframes ring-out { to { transform: scale(1.3); opacity: 0; } }
        #visa-dash .ring-core {
            width: 36px; height: 36px; border-radius: 50%;

        /* Daily — animated sine-wave bar chart */
        #visa-dash .wave { display: flex; align-items: flex-end; gap: 4px; height: 100%; width: 100%; }
        #visa-dash .wave-bar {

        @media (prefers-reduced-motion: no-preference) {
            #visa-dash .wave-bar { animation: wave-up 1.4s cubic-bezier(.2,.8,.2,1) infinite alternate; }

        @keyframes wave-up { from { transform: scaleY(.3); } to { transform: scaleY(1); } }
        /* Past — stacked waterfall */
        #visa-dash .wf { display: flex; align-items: flex-end; gap: 4px; height: 100%; width: 100%; }
        #visa-dash .wf-col { flex: 1; display: flex; flex-direction: column-reverse; gap: 2px; }
        #visa-dash .wf-seg { width: 100%; border-radius: 2px; }

        /* Suggest — typewriter card */
        #visa-dash .paper {

            #visa-dash .filter-row { flex-direction: column; align-items: stretch; gap: 8px; }
            #visa-dash .datefilter { width: 100%; }

            #visa-dash .suggest-grid .table-col { flex: 1 1 100%; }

            #visa-dash .hero { padding: 18px 16px; }
            #visa-dash .hero-title { font-size: 20px; }
        }
    
    </style>
    <script>


        (function() {
            const HARDCODED_WEB_APP_URL = '';
            const WEB_APP_URL = (window.VISA_WEB_APP_URL || HARDCODED_WEB_APP_URL || '').trim();
            const TRACKING_STARTED = '2026-07-13';
            const EXCLUDE_FROM_AVERAGES = '2026-07-12';
            const CACHE_FRESH_MS = 5 * 60 * 1000;

            const root = document.getElementById('visa-dash');
            let cache = null;
            let cacheFetchedAt = null;
            let dataPromise = null;
            let suggestionsCache = null;
            let activeTab = 'home';
            let homeSearchTerm = '';
            let pastDateFilter = '';
            let pendingSearchSelection = null;
            let theme = localStorage.getItem('visa-theme') || 'light';

            function classify(decision) {
                const s = (decision || '').toLowerCase();
                if (/(approv|grant|accept|issu)/.test(s)) return 'accepted';
                if (/(refus|reject|deny|denied)/.test(s)) return 'rejected';
                return 'other';
            }

            function escapeHtml(value) {
                return String(value == null ? '' : value).replace(/[&<>"']/g, ch => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                }[ch]));
            }

            function fmtPct(n) { return isFinite(n) ? (n * 100).toFixed(1) + '%' : '\u2014'; }

            function daysAgo(dateStr) { return Math.floor((Date.now() - new Date(dateStr + 'T00:00:00')) / 86400000); }

            function weekdayLong(dateStr) {
                const d = new Date(dateStr + 'T00:00:00');
                return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            }

            function groupByDate(rows) {
                const m = new Map();
                rows.forEach(r => { if (!m.has(r.date)) m.set(r.date, []);
                    m.get(r.date).push(r); });
                return [...m.entries()].sort((a, b) => b[0].localeCompare(a[0]));
            }

            function avgDailyApps(byDate) {
                var filtered = byDate.filter(function(e) { return e[0] !== EXCLUDE_FROM_AVERAGES; });
                if (!filtered.length) return 0;
                var sum = 0;
                for (var i = 0; i < filtered.length; i++) sum += filtered[i][1].length;
                return sum / filtered.length;
            }

            async function loadData(options) {
                const force = options && options.force;
                // Return cached data only if it's still fresh AND we're not forcing a refresh.
                if (!force && cache !== null && cacheFetchedAt && (Date.now() - cacheFetchedAt < CACHE_FRESH_MS)) return cache;
                if (dataPromise) return dataPromise;
                if (!WEB_APP_URL) {
                    if (cache === null) cache = [];
                    cacheFetchedAt = Date.now();
                    return cache;
                }
                dataPromise = (async () => {
                    try {
                        const res = await fetch(WEB_APP_URL + '?action=raw');
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        const raw = await res.json();
                        cache = raw.map(r => Array.isArray(r) ? { date: r[0], irl: r[1], decision: r[2] } : r);
                        cacheFetchedAt = Date.now();
                    } catch (e) {
                        console.warn('loadData failed:', e);
                        if (cache === null) cache = [];
                    } finally {
                        dataPromise = null;
                    }
                    return cache;
                })();
                return dataPromise;
            }


            async function loadSuggestions() {
                if (suggestionsCache) return suggestionsCache;
                if (!WEB_APP_URL) { suggestionsCache = []; return suggestionsCache; }
                try {
                    const res = await fetch(WEB_APP_URL + '?action=suggestions');
                    const raw = await res.json();
                    if (Array.isArray(raw) && raw.length > 0) {
                        if (Array.isArray(raw[0])) {
                            const headers = raw[0];
                            suggestionsCache = raw.slice(1).map(row => {
                                const obj = {};
                                headers.forEach((h, i) => { obj[h] = row[i] !== undefined ? row[i] : ''; });
                                return obj;
                            });
                        } else {
                            suggestionsCache = raw;
                        }
                    } else {
                        suggestionsCache = [];
                    }
                    return suggestionsCache;
                } catch (e) {
                    suggestionsCache = [];
                    return suggestionsCache;
                }
            }

            function renderConfigWarning() {
                return WEB_APP_URL ? '' :
                    '<div class="config-warn">No data source configured yet. Deploy <code>Code.gs</code> as a Web App and paste its <code>/exec</code> URL into <code>WEB_APP_URL</code> at the top of this file\'s script.</div>';
            }

            function searchIcon() {
                return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>';
            }

            function readmeSection() {
                return '<div class="readme"><div class="readme-title">How this tracker works</div>' +
                    '<p>Every day, an automated job checks the Irish embassy\'s New Delhi visa decisions page for the latest published spreadsheet and pulls any application numbers that haven\'t been recorded yet.</p>' +
                    '<ul>' +
                    '<li><strong>Home</strong> \u2014 today\'s snapshot, headline stats, and every result from the most recent file.</li>' +
                    '<li><strong>Daily summary</strong> \u2014 one row per day: volume, day-on-day change, acceptance and rejection rates.</li>' +
                    '<li><strong>Past results</strong> \u2014 full history, searchable by application number.</li>' +
                    '<li><strong>Suggestions</strong> \u2014 leave feedback. I check the suggestions and get back with a reply asap.</li>' +
                    '</ul>' +
                    '<p style="margin-top:12px;"><strong>After approval:</strong> Once your visa is approved, it is dispatched through <strong>BlueDart</strong> (in most cases) and follows standard courier delivery timelines from Delhi to your address.</p>' +
                    '</div>';
            }

            // ===== hero builder (Mockup C) — per-tab hero with real data =====
            function buildHeroHTML(tabId, rows) {
                const byDate = groupByDate(rows);
                const total = rows.length;
                const accepted = rows.filter(r => classify(r.decision) === 'accepted').length;
                const rejected = rows.filter(r => classify(r.decision) === 'rejected').length;
                const accPct = total ? accepted / total : 0;
                const rejPct = total ? rejected / total : 0;
                const avg = avgDailyApps(byDate);
                const latest = byDate.length ? byDate[0] : null;
                const latestCount = latest ? latest[1].length : 0;
                const prev = byDate.length > 1 ? byDate[1] : null;
                const dayDiff = prev ? latestCount - prev[1].length : 0;

                const states = {
                    home: {
                        eyebrow: "TODAY'S SNAPSHOT",
                        title: latestCount + ' new outcomes<br/>today.',
                        sub: (dayDiff >= 0 ? '+' : '') + dayDiff + ' vs. yesterday · ' + fmtPct(accPct) + ' accepted.',
                        visual: '<div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring-core">' + latestCount + '</div>'
                    },
                    daily: {
                        eyebrow: 'DAILY TREND',
                        title: byDate.length + ' days<br/>on record.',
                        sub: 'Avg ' + avg.toFixed(1) + ' applications/day. ' + fmtPct(accPct) + ' acceptance rate.',
                        visual: (function() {
                            const last14 = byDate.slice(-14).reverse();
                            const max = Math.max.apply(null, last14.map(function(d) { return d[1].length; }).concat([1]));
                            return '<div class="wave">' + last14.map(function(d, i) {
                                var dayRows = d[1];
                                return '<div class="wave-bar" style="height:' + Math.max(8, (dayRows.length / max) * 120) + 'px; animation-delay:' + (i * 0.07) + 's"></div>';
                            }).join('') + '</div>';
                        })()
                    },
                    past: {
                        eyebrow: 'HISTORY',
                        title: 'Accepted & rejected,<br/>side by side.',
                        sub: fmtPct(accPct) + ' accepted · ' + fmtPct(rejPct) + ' rejected · ' + total.toLocaleString() + ' total.',
                        visual: (function() {
                            var last7 = byDate.slice(-7).reverse();
                            var maxVal = Math.max.apply(null, last7.map(function(d) {
                                var dr = d[1];
                                return dr.filter(function(r) { return classify(r.decision) === 'accepted'; }).length +
                                       dr.filter(function(r) { return classify(r.decision) === 'rejected'; }).length;
                            }).concat([1]));
                            var scale = Math.min(1, 130 / Math.max(maxVal, 1));
                            return '<div class="wf">' + last7.map(function(d) {
                                var dayRows = d[1];
                                var acc = dayRows.filter(function(r) { return classify(r.decision) === 'accepted'; }).length;
                                var rej = dayRows.filter(function(r) { return classify(r.decision) === 'rejected'; }).length;
                                return '<div class="wf-col"><div class="wf-seg a" style="height:' + Math.max(3, acc * scale) + 'px"></div><div class="wf-seg r" style="height:' + Math.max(3, rej * scale) + 'px"></div></div>';
                            }).join('') + '</div>';
                        })()
                    },
                    suggest: {
                        eyebrow: 'FROM USERS',
                        title: 'Real notes,<br/>real replies.',
                        sub: 'Leave a suggestion below. I read every one and reply asap.',
                        visual: (function() {
                            var lastSugg = (suggestionsCache && suggestionsCache.length) ? suggestionsCache[suggestionsCache.length - 1] : null;
                            var text = lastSugg ? (lastSugg.suggestion || lastSugg.Suggestion || lastSugg.text || '') : '';
                            var name = lastSugg ? (lastSugg.name || lastSugg.Name || '') : '';
                            var display = text || 'No suggestions yet';
                            return '<div class="paper"><div class="paper-title">' + (name ? 'From: ' + escapeHtml(name) : 'Recent') + '</div><div class="paper-text">' + escapeHtml(display) + '</div></div>';
                        })()
                    }
                };
                return states[tabId] || states.home;
            }

            function morphHero() {
                var hero = document.getElementById('hero');
                if (!hero || window._heroHasRendered) return;
                window._heroHasRendered = true;
                var prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                if (prefersReduced) {
                    hero.style.opacity = '1';
                    return;
                }
                requestAnimationFrame(function() {
                    requestAnimationFrame(function() {
                        hero.style.opacity = '1';
                    });
                });
            }

            function animateHeroSwitch(tabId, rows) {
                var hero = document.getElementById('hero');
                if (!hero) return;
                if (hero._switchTimer) clearTimeout(hero._switchTimer);
                var state = buildHeroHTML(tabId, rows);
                hero.style.transition = 'opacity 0.18s ease';
                hero.style.opacity = '0.4';
                hero._switchTimer = setTimeout(function() {
                    hero._switchTimer = null;
                    hero.setAttribute('data-id', tabId);
                    hero.querySelector('.hero-eyebrow').textContent = state.eyebrow;
                    hero.querySelector('.hero-title').innerHTML = state.title;
                    hero.querySelector('.hero-sub').textContent = state.sub;
                    hero.querySelector('.visual').innerHTML = state.visual;
                    hero.style.opacity = '1';
                }, 180);
            }

            function wireTabListeners() {
                var homeSearchEl = document.getElementById('home-search');
                if (homeSearchEl) {
                    homeSearchEl.addEventListener('input', function(e) {
                        homeSearchTerm = e.target.value;
                        pendingSearchSelection = { start: e.target.selectionStart, end: e.target.selectionEnd };
                        refreshTabBody();
                    });
                    if (activeTab === 'home') {
                        homeSearchEl.focus();
                        if (pendingSearchSelection) {
                            homeSearchEl.setSelectionRange(pendingSearchSelection.start, pendingSearchSelection.end);
                            pendingSearchSelection = null;
                        } else {
                            homeSearchEl.setSelectionRange(homeSearchEl.value.length, homeSearchEl.value.length);
                        }
                    }
                }
                var dateFilterEl = document.getElementById('past-date-filter');
                if (dateFilterEl) dateFilterEl.addEventListener('change', function(e) { pastDateFilter = e.target.value; refreshTabBody(); });
                var dateClearEl = document.getElementById('past-date-clear');
                if (dateClearEl) dateClearEl.addEventListener('click', function() { pastDateFilter = ''; refreshTabBody(); });
                var suggBtn = document.getElementById('sugg-submit');
                if (suggBtn) suggBtn.addEventListener('click', submitSuggestion);
                var scrollBtn = document.getElementById('scroll-top-btn');
                if (scrollBtn) {
                    var onScroll = function() {
                        if (window.scrollY > 300) scrollBtn.classList.add('visible');
                        else scrollBtn.classList.remove('visible');
                    };
                    if (window._scrollTopHandler) window.removeEventListener('scroll', window._scrollTopHandler);
                    window._scrollTopHandler = onScroll;
                    window.addEventListener('scroll', onScroll, { passive: true });
                    onScroll();
                    scrollBtn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
                }
            }

            async function switchTab(tabId) {
                if (!document.getElementById('hero')) return;
                activeTab = tabId;
                var pills = document.querySelectorAll('#visa-dash .navpill');
                for (var i = 0; i < pills.length; i++) {
                    pills[i].classList.toggle('active', pills[i].getAttribute('data-tab') === tabId);
                }
                // Use cached data to avoid stutter
                var rows = cache && cache.length ? cache : await loadData();
                // Load suggestions BEFORE hero so the typewriter card shows real data
                if (tabId === 'suggest') await loadSuggestions();
                animateHeroSwitch(tabId, rows);
                var body = '';
                if (tabId === 'home') body = renderHome(rows);
                else if (tabId === 'daily') body = renderDailySummary(rows);
                else if (tabId === 'past') body = renderPast(rows);
                else {
                    body = renderSuggestions(suggestionsCache);
                }
                var tabBody = document.getElementById('tab-body');
                if (tabBody) tabBody.innerHTML = body;
                wireTabListeners();
            }

            function renderHome(rows) {
                if (!rows.length) return renderConfigWarning() +
                    '<div class="empty">No decisions recorded yet.</div>';
                const total = rows.length;
                const byDate = groupByDate(rows);
                const latest = byDate[0],
                    prev = byDate[1];
                const latestDate = latest[0];
                const latestRows = latest[1];
                const dayDiff = prev ? latestRows.length - prev[1].length : 0;

                const avg = avgDailyApps(byDate);

                const accepted = rows.filter(r => classify(r.decision) === 'accepted').length;
                const rejected = rows.filter(r => classify(r.decision) === 'rejected').length;

                const isSearching = homeSearchTerm.trim().length > 0;
                const searchResults = isSearching ?
                    rows.filter(r => r.irl.toLowerCase().includes(homeSearchTerm.toLowerCase())).slice().sort((a,
                        b) => b.date.localeCompare(a.date)) :
                    latestRows;

                return renderConfigWarning() +
                    readmeSection() +
                    '<div class="latest-date">Latest available data: <strong>' + weekdayLong(latestDate) +
                    '</strong></div>' +
                    '<div class="tracking-since">Tracking started ' + weekdayLong(TRACKING_STARTED) + '</div>' +
                    '<div class="note" style="margin-bottom:16px;">' +
                    '<ul style="margin:0; padding-left:18px; list-style-type: disc;">' +
                    '<li>The latest Excel file from the embassy contains decisions up to <strong>' + weekdayLong(latestDate) + '</strong>. This website includes all decisions recorded up to that date.</li>' +
                    '<li>The Irish Embassy Delhi typically uploads the Excel file at <strong>11:00 AM IST</strong> each day. For the freshest updates, check this page around <strong>11:15 AM IST</strong>.</li>' +
                    '</ul>' +
                    '</div>' +
                    '<div class="searchbar">' + searchIcon() +
                    '<input type="text" id="home-search" placeholder="Search by application number\u2026" value="' +
                    homeSearchTerm + '"></div>' +
                    '<div class="cards">' +
                    
                    '<div class="card"><div class="label">Day-on-day change</div><div class="value ' + (dayDiff >= 0 ?
                        'green' : 'red') + '">' + (dayDiff >= 0 ? '+' : '') + dayDiff + '</div></div>' +
                    '<div class="card"><div class="label">Avg applications/day</div><div class="value">' + avg
                    .toFixed(1) + '</div></div>' +
                    '<div class="card"><div class="label">Acceptance rate</div><div class="value green">' + fmtPct(
                        accepted / total) + '</div></div>' +
                    '<div class="card"><div class="label">Rejection rate</div><div class="value red">' + fmtPct(rejected /
                        total) + '</div></div>' +
                    '</div>' +
                    '<div class="note" style="margin-bottom:8px;margin-top:0;">' + (isSearching ? (searchResults.length +
                        ' match(es) for "' + homeSearchTerm + '"') : ('All results for ' + latestDate + ' (' + latestRows
                        .length + ' rows)')) + '</div>' +
                    '<div class="table-wrap"><table><thead><tr><th>Date</th><th>Application No.</th><th>Decision</th></tr></thead>' +
                    '<tbody>' + (searchResults.length ? searchResults.map(rowHtml).join('') :
                        '<tr><td colspan="3" class="empty">No matches.</td></tr>') + '</tbody></table></div>';
            }

            function rowHtml(r) {
                const c = classify(r.decision);
                const pillClass = c === 'accepted' ? 'green' : c === 'rejected' ? 'red' : 'amber';
                return '<tr><td class="mono">' + r.date + '</td><td class="mono">' + r.irl +
                    '</td><td><span class="pill ' + pillClass + '">' + (r.decision || '\u2014') + '</span></td></tr>';
            }

            function renderDailySummary(rows) {
                if (!rows.length) return renderConfigWarning() +
                    '<div class="empty">No decisions recorded yet.</div>';
                const byDate = groupByDate(rows);
                const trs = byDate.map(([date, dayRows], idx) => {
                    const prevCount = byDate[idx + 1] ? byDate[idx + 1][1].length : null;
                    const diff = prevCount === null ? null : dayRows.length - prevCount;
                    const acc = dayRows.filter(r => classify(r.decision) === 'accepted').length / dayRows.length;
                    const rej = dayRows.filter(r => classify(r.decision) === 'rejected').length / dayRows.length;
                    return '<tr><td class="mono">' + date + '</td><td>' + dayRows.length + '</td><td>' +
                        (diff === null ? '\u2014' : ('<span class="pill ' + (diff >= 0 ? 'green' : 'red') + '">' + (
                            diff >= 0 ? '+' : '') + diff + '</span>')) +
                        '</td><td>' + fmtPct(acc) + '</td><td>' + fmtPct(rej) + '</td></tr>';
                }).join('');
                return renderConfigWarning() +
                    '<div class="table-wrap"><table><thead><tr><th>Date</th><th>Applications Processed</th><th>Day-on-Day</th><th>Acceptance Rate</th><th>Rejection Rate</th></tr></thead>' +
                    '<tbody>' + trs + '</tbody></table></div>';
            }

            function renderPast(rows) {
                if (!rows.length) return renderConfigWarning() +
                '<div class="empty">No decisions recorded yet.</div>';
                const total = rows.length;
                const accepted = rows.filter(r => classify(r.decision) === 'accepted').length;
                const rejected = rows.filter(r => classify(r.decision) === 'rejected').length;
                const byDate = groupByDate(rows);

                const avg = avgDailyApps(byDate);

                const thisWeek = rows.filter(r => daysAgo(r.date) < 7).length;
                const lastWeek = rows.filter(r => daysAgo(r.date) >= 7 && daysAgo(r.date) < 14).length;
                const wow = lastWeek ? (thisWeek - lastWeek) / lastWeek : null;

                const sorted = rows
                    .filter(r => !pastDateFilter || r.date === pastDateFilter)
                    .slice().sort((a, b) => b.date.localeCompare(a.date));

                return renderConfigWarning() +
                    '<div class="cards">' +
                    '<div class="card"><div class="label">Acceptance rate</div><div class="value green">' + fmtPct(
                        accepted / total) + '</div></div>' +
                    '<div class="card"><div class="label">Rejection rate</div><div class="value red">' + fmtPct(rejected /
                        total) + '</div></div>' +
                    '<div class="card"><div class="label">Avg applications/day</div><div class="value">' + avg
                    .toFixed(1) + '</div></div>' +
                    '<div class="card"><div class="label">Week-on-week</div><div class="value ' + (wow === null ? '' : (
                        wow >= 0 ? 'green' : 'red')) + '">' + (wow === null ? '\u2014' : ((wow >= 0 ? '+' : '') + fmtPct(
                        wow))) + '</div></div>' +
                    '</div>' +
                    '<div class="filter-row">' +
                    '<div class="note" style="margin-top:0;">Use the search bar on the Home tab to look up a specific application number.</div>' +
                    '<div class="datefilter"><input type="date" id="past-date-filter" value="' + pastDateFilter + '">' +
                    (pastDateFilter ? '<span class="clear-btn" id="past-date-clear" title="Clear date filter">\u00d7</span>' :
                        '') +
                    '</div>' +
                    '</div>' +
                    '<div class="table-wrap"><table><thead><tr><th>Date</th><th>Application No.</th><th>Decision</th></tr></thead>' +
                    '<tbody>' + (sorted.length ? sorted.map(rowHtml).join('') :
                        '<tr><td colspan="3" class="empty">No matches.</td></tr>') + '</tbody></table></div>' +
                    '<button class="scroll-top-btn" id="scroll-top-btn" title="Scroll to top">\u2191</button>';
            }

            function renderSuggestions(suggestions) {
                const formHtml = '<div class="card" style="max-width:100%;">' +
                    '<div class="label" style="margin-bottom:12px;">Submit a suggestion</div>' +
                    '<input type="text" id="sugg-name" placeholder="Your name" />' +
                    '<textarea id="sugg-text" placeholder="Your suggestion\u2026"></textarea>' +
                    '<button class="btn" id="sugg-submit">Submit</button>' +
                    '<div class="note" id="sugg-status"></div>' +
                    '</div>';

                let tableHtml = '';
                if (suggestions && suggestions.length) {
                    const headers = Object.keys(suggestions[0]);
                    const rows = suggestions.map(s => {
                        return '<tr>' + headers.map(h => '<td>' + (s[h] !== undefined ? s[h] : '') + '</td>').join('') +
                            '</tr>';
                    }).join('');
                    tableHtml = '<div class="table-wrap"><table><thead><tr>' +
                        headers.map(h => '<th>' + h + '</th>').join('') +
                        '</tr></thead><tbody>' + rows + '</tbody></table></div>';
                } else {
                    tableHtml = '<div class="empty" style="padding:20px;">No suggestions yet.</div>';
                }

                return renderConfigWarning() +
                    '<div class="suggest-grid">' +
                    '<div class="form-col">' + formHtml + '</div>' +
                    '<div class="table-col"><div class="label" style="margin-bottom:8px;">All suggestions</div>' + tableHtml +
                    '</div>' +
                    '</div>';
            }

            async function submitSuggestion() {
                const name = document.getElementById('sugg-name').value.trim();
                const suggestion = document.getElementById('sugg-text').value.trim();
                const status = document.getElementById('sugg-status');
                const btn = document.getElementById('sugg-submit');
                if (!name || !suggestion) { status.textContent = 'Please fill in both fields.'; return; }
                if (!WEB_APP_URL) { status.textContent = 'Data source not configured yet.'; return; }
                btn.disabled = true;
                status.textContent = 'Submitting…';
                try {
                    const now = new Date();
                    const timestamp = now.toISOString();
                    const timezone = 'Asia/Kolkata';
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: new URLSearchParams({ name, suggestion, timestamp, timezone })
                    });
                    status.textContent = 'Thanks — suggestion recorded. I\'ll read your suggestion and get back to you.';
                    document.getElementById('sugg-name').value = '';
                    document.getElementById('sugg-text').value = '';
                    suggestionsCache = null;
                    const newSuggestions = await loadSuggestions();
                    const tabBody = document.getElementById('tab-body');
                    if (tabBody && activeTab === 'suggest') {
                        tabBody.innerHTML = renderSuggestions(newSuggestions);
                        const newBtn = document.getElementById('sugg-submit');
                        if (newBtn) newBtn.addEventListener('click', submitSuggestion);
                    }
                } catch (err) {
                    status.textContent = 'Could not submit — try again.';
                } finally {
                    btn.disabled = false;
                }
            }

            
            function toggleTheme() {
                theme = theme === 'light' ? 'dark' : 'light';
                localStorage.setItem('visa-theme', theme);
                root.setAttribute('data-theme', theme);
                // Theme switch is instant via CSS variables — no DOM rebuild needed
                var themeToggle = document.getElementById('theme-toggle');
                if (themeToggle) themeToggle.textContent = theme === 'dark' ? '\uD83C\uDF19' : '\u2600\uFE0F';
            }

            // Partial re-render: only updates tab-body without destroying hero/navpills/header.
            // Used for search, date filter, and other in-tab interactions to avoid stutter.
            async function refreshTabBody() {
                var tabBody = document.getElementById('tab-body');
                if (!tabBody) return;
                var rows = await loadData();
                // Load suggestions if on suggest tab so the typewriter card stays fresh
                if (activeTab === 'suggest') await loadSuggestions();
                var body = '';
                if (activeTab === 'home') body = renderHome(rows);
                else if (activeTab === 'daily') body = renderDailySummary(rows);
                else if (activeTab === 'past') body = renderPast(rows);
                else {
                    body = renderSuggestions(suggestionsCache);
                }
                tabBody.innerHTML = body;
                // Retrigger card entrance animations on the new DOM
                var cards = tabBody.querySelectorAll('.card');
                for (var i = 0; i < cards.length; i++) {
                    cards[i].style.animation = 'none';
                    cards[i].offsetHeight; // force reflow
                    cards[i].style.animation = '';
                }
                // Strip animation-fill after the longest stagger so hover transforms work
                setTimeout(function() {
                    var allCards = tabBody.querySelectorAll('.card');
                    for (var j = 0; j < allCards.length; j++) {
                        allCards[j].style.animation = 'none';
                    }
                }, 900);
                wireTabListeners();
            }
            
async function render() {
                if (!cache) {
                    root.innerHTML = '<div class="eyebrow">Ireland \u00b7 New Delhi Visa Section</div>' +
                        '<div class="titlerow"><h1>Visa Decision Tracker</h1>' +
                        '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">' +
                        '<button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">☀️</button>' +
                        '<div class="stutter-badge"><i>\u24D8</i> Switching tabs may briefly stutter while data loads.</div></div></div>' +
                        '<div class="topbar"><div class="topbar-fill"></div></div>' +
                        '<div class="navpills">' +
                        '<div class="skel skel-pill"></div><div class="skel skel-pill"></div><div class="skel skel-pill"></div><div class="skel skel-pill"></div>' +
                        '</div>' +
                        '<div class="cards">' +
                        '<div class="skel skel-card" style="grid-column:span 2;animation-delay:0.02s"></div>' +
                        '<div class="skel skel-card" style="animation-delay:0.07s"></div>' +
                        '<div class="skel skel-card" style="animation-delay:0.12s"></div>' +
                        '<div class="skel skel-card" style="animation-delay:0.17s"></div>' +
                        '</div>' +
                        '<div class="skel-wrap">' +
                        '<div class="skel skel-row" style="width:70%"></div>' +
                        '<div class="skel skel-row" style="width:55%"></div>' +
                        '<div class="skel skel-row" style="width:65%"></div>' +
                        '<div class="skel skel-row" style="width:45%"></div>' +
                        '<div class="skel skel-row" style="width:60%"></div>' +
                        '</div>';
                }
                const rows = await loadData();
                const tabs = [
                    ['home', 'Home'],
                    ['daily', 'Daily Summary'],
                    ['past', 'Past Results'],
                    ['suggest', 'Suggestions'],
                ];
                let body = '';
                if (activeTab === 'home') body = renderHome(rows);
                else if (activeTab === 'daily') body = renderDailySummary(rows);
                else if (activeTab === 'past') body = renderPast(rows);
                else {
                    const suggestions = await loadSuggestions();
                    body = renderSuggestions(suggestions);
                }

                const heroState = buildHeroHTML(activeTab, rows);

                root.innerHTML =
                    '<div class="eyebrow">Ireland \u00b7 New Delhi Visa Section</div>' +
                    '<div class="titlerow"><h1>Visa Decision Tracker</h1>' +
                    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">' +
                    '<button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">☀️</button>' +
                    '<div class="stutter-badge"><i>\u24D8</i> Switching tabs may briefly stutter while data loads.</div></div>' +
                    '</div>' +
                    '<div class="sub">' + (cache && cache.length ? cache.length + ' decisions on record' :
                        'Awaiting data') + '</div>' +
                    '<div class="navpills">' + tabs.map(([k, label]) => '<div class="navpill ' + (activeTab === k ?
                        'active' : '') + '" data-tab="' + k + '">' + label + '</div>').join('') + '</div>' +
                    '<div class="hero" id="hero" data-id="' + activeTab + '" style="opacity:0">' +
                        '<div class="hero-body">' +
                            '<div>' +
                                '<div class="hero-eyebrow">' + heroState.eyebrow + '</div>' +
                                '<div class="hero-title">' + heroState.title + '</div>' +
                                '<div class="hero-sub">' + heroState.sub + '</div>' +
                            '</div>' +
                            '<div class="visual">' + heroState.visual + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div id="tab-body">' + body + '</div>';

                tabs.forEach(([k]) => {
                    var pill = root.querySelector('.navpill[data-tab="' + k + '"]');
                    pill.addEventListener('click', function() {
                        // Trigger ripple animation
                        pill.classList.add('rippling');
                        setTimeout(function() { pill.classList.remove('rippling'); }, 520);
                        switchTab(k);
                    });
                });
                const homeSearchEl = document.getElementById('home-search');
                if (homeSearchEl) {
                    homeSearchEl.addEventListener('input', e => {
                        homeSearchTerm = e.target.value;
                        pendingSearchSelection = { start: e.target.selectionStart, end: e.target.selectionEnd };
                        refreshTabBody();
                    });
                    homeSearchEl.focus();
                    homeSearchEl.setSelectionRange(homeSearchEl.value.length, homeSearchEl.value.length);
                }
                const dateFilterEl = document.getElementById('past-date-filter');
                if (dateFilterEl) dateFilterEl.addEventListener('change', e => { pastDateFilter = e.target.value;
                    refreshTabBody(); });
                const dateClearEl = document.getElementById('past-date-clear');
                if (dateClearEl) dateClearEl.addEventListener('click', () => { pastDateFilter = '';
                    refreshTabBody(); });
                const suggBtn = document.getElementById('sugg-submit');
                if (suggBtn) suggBtn.addEventListener('click', submitSuggestion);
                const themeToggle = document.getElementById('theme-toggle');
                if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
                morphHero();
                const scrollBtn = document.getElementById('scroll-top-btn');
                if (scrollBtn) {
                    const onScroll = function() {
                        if (window.scrollY > 300) scrollBtn.classList.add('visible');
                        else scrollBtn.classList.remove('visible');
                    };
                    if (window._scrollTopHandler) window.removeEventListener('scroll', window._scrollTopHandler);
                    window._scrollTopHandler = onScroll;
                    window.addEventListener('scroll', onScroll, { passive: true });
                    onScroll();
                    scrollBtn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
                }
            }

            root.setAttribute('data-theme', theme);
            render();
        })();
    
    
    </script>
</body>
</html>
